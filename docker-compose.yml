version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pesagem-db
    environment:
      POSTGRES_USER: pesagem
      POSTGRES_PASSWORD: pesagem
      POSTGRES_DB: pesagem
    ports:
      - "5432:5432"
    volumes:
      - pesagem_data:/var/lib/postgresql/data

volumes:
  pesagem_data:
